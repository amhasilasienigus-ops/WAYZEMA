<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ምዝገባው ተሳክቷል - ዋይዜማ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #FDF5E6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .message-box {
            background-image: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('birana.jpg');
            background-size: cover;
            background-position: center;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            border: 5px solid #D4AF37;
            max-width: 500px;
            text-align: center;
        }
        h2 { color: #003366; margin-bottom: 20px; }
        p { font-size: 1.1rem; line-height: 1.6; color: #2C2C2C; font-weight: 500; }
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: #003366;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background-color: #D4AF37; color: #003366; }
    </style>
</head>
<body>
    <div class="message-box">
        <h2>እንኳን ደስ አልዎት!</h2>
        <p>እንኳን ወደ ዋይዜማ የበገናና መንፈሳዊ ጥበባት ማሠልጠኛ በደኅና መጡ! የመጀመሪያውን ደረጃ ምዝገባ ሥላጠናቀቁ እንኳን ደስ አልዎት! ወደ ቀጣዩ ደረጃ ለመሔድ በኢሜልዎ ወይም በስልክ ቁጥርዎ የሚደርስዎትን መለያ ቁጥር (user name) ይጠቀሙ።</p>
        <a href="index.html" class="btn">ወደ መነሻ ገጽ ተመለስ</a>
    </div>
</body>
</html>
