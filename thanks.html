<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ምስጋና - ዋይዜማ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            background-color: #FDF5E6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .message-box {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 10px solid #D4AF37;
            max-width: 500px;
        }
        i { color: #003366; font-size: 4rem; margin-bottom: 20px; }
        h1 { color: #003366; font-size: 1.8rem; }
        p { color: #555; margin-bottom: 30px; }
        .btn-back {
            background-color: #D4AF37;
            color: #003366;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            transition: 0.3s;
        }
        .btn-back:hover { background-color: #003366; color: white; }
    </style>
</head>
<body>
    <div class="message-box">
        <i class="fas fa-check-circle"></i>
        <h1>ወደ ዋይዜማ የመንፈሳዊ ጥበባት ማዕከል እንኳን በደኅና መጡ!</h1>
        <p>ምዝገባዎን በተሳካ ሁኔታ አጠናቀዋል። በቅርቡ በስልክ ቁጥርዎ እናገኝዎታለን።</p>
        <a href="index.html" class="btn-back">ወደ መነሻ ገጽ ተመለስ</a>
    </div>
</body>
</html>
