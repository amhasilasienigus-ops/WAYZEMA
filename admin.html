<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>ዋይዜማ - Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #003366; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3>የአስተዳዳሪ መግቢያ</h3>
        <input type="text" placeholder="የተጠቃሚ ስም">
        <input type="password" placeholder="የይለፍ ቃል">
        <button onclick="alert('ይህ ገጽ በቅርቡ ወደ Formspree Dashboard ይገናኛል!')">ግባ</button>
    </div>
</body>
</html>
