<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዋይዜማ - የአስተዳዳሪ ክፍል</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .dashboard-container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #D4AF37; padding-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 20px 0; }
        .stat-card { background: #003366; color: white; padding: 20px; border-radius: 8px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f8f9fa; color: #003366; }
        .btn-live { background: #D4AF37; color: #003366; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h2>የዋይዜማ አስተዳዳሪ ዳሽቦርድ</h2>
            <a href="https://formspree.io/forms/mqegpkpe/submissions" target="_blank" class="btn-live">የተመዘገቡ ተማሪዎችን ዝርዝር እዚህ ተመልከት</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>ጠቅላላ ተማሪዎች</h3><p style="font-size: 24px;">--</p></div>
            <div class="stat-card"><h3>አዲስ ምዝገባ</h3><p style="font-size: 24px;">--</p></div>
            <div class="stat-card"><h3>ንቁ ክፍለ ጊዜያት</h3><p style="font-size: 24px;">6</p></div>
        </div>

        <h3>የቅርብ ጊዜ እንቅስቃሴዎች</h3>
        <table>
            <thead>
                <tr>
                    <th>ስም</th>
                    <th>ስልክ</th>
                    <th>የሰለጠነበት ዘርፍ</th>
                    <th>ቀን</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="4" style="text-align: center;">አዳዲስ መረጃዎችን ለማየት ከላይ ያለውን ቢጫ ቁልፍ ይጫኑ</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
