<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዋይዜማ የበገናና መንፈሳዊ ጥበባት ማሠልጠኛ ማዕከል</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --deep-blue: #003366; 
            --parchment-bg: #FDF5E6; 
            --dark-text: #2C2C2C;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--parchment-bg);
            color: var(--dark-text);
            line-height: 1.6;
        }

        header {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('birana.jpg');
            background-size: cover;
            background-position: center;
            color: var(--deep-blue);
            padding: 1.5rem 1rem; 
            text-align: center;
            border-bottom: 8px solid var(--primary-gold);
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        header h1 { margin: 0; font-size: 1.6rem; font-weight: bold; }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 8px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('Begena.jpg');
            background-size: cover;
            background-position: center;
            color: white;
            height: 250px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 10px;
        }

        .form-section {
            background-image: url('birana.jpg');
            background-size: cover;
            background-position: center;
            padding: 25px 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin: 20px 0;
            border-top: 6px solid var(--primary-gold);
        }

        .form-section h2 { text-align: center; color: var(--deep-blue); margin-bottom: 20px; }

        .registration-form { display: grid; gap: 12px; max-width: 500px; margin: auto; }

        .form-group { display: flex; flex-direction: column; }

        .form-group label { font-weight: bold; margin-bottom: 4px; color: var(--deep-blue); font-size: 0.9rem; }

        .form-group input, .form-group select {
            padding: 10px;
            border: 1px solid var(--primary-gold);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
        }

        .btn-submit {
            background-color: var(--deep-blue);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .services {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px;
            margin-top: 20px;
        }

        .card {
            background-image: url('birana.jpg');
            background-size: cover;
            border-radius: 8px;
            border-top: 4px solid var(--primary-gold);
            text-align: center;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card-image {
            width: 100%;
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
            background-color: rgba(238, 238, 238, 0.4); 
            height: 120px;
        }

        .card h3 { font-size: 0.95rem; margin: 8px 0; color: var(--deep-blue); }
        .card p { font-size: 0.8rem; padding: 0 5px 10px 5px; margin: 0; }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>ዋይዜማ የበገናና መንፈሳዊ ጥበባት ማሠልጠኛ ማዕከል</h1>
    <p>«ጥንታዊውን ጥበብ ለዘመኑ ትውልድ»</p>
</header>

<nav>
    <a href="#home">መነሻ</a>
    <a href="#register">መመዝገቢያ</a>
    <a href="#services">ዘርፎች</a>
</nav>

<section class="hero" id="home">
    <h2 style="font-size: 1.5rem; margin-bottom: 5px;">የጥበብ መጀመሪያ እግዚአብሔርን መፍራት ነው</h2>
    <p style="font-size: 0.9rem;">ጥንታዊ ጥበባት ከሰማያዊ ምሥጢራቸው ጋር</p>
</section>

<div class="container">
    
    <section id="register" class="form-section">
        <h2>የምዝገባ ቅጽ</h2>
        <form class="registration-form" action="https://formspree.io/f/mqegpkpe" method="POST">
            
            <input type="hidden" name="_next" value="https://enigus-ops.github.io/thanks.html">
            
            <div class="form-group">
                <label>ሙሉ ስም</label>
                <input type="text" name="full_name" required>
            </div>
            <div class="form-group">
                <label>ጾታ</label>
                <select name="gender">
                    <option value="ወንድ">ወንድ</option>
                    <option value="ሴት">ሴት</option>
                </select>
            </div>
            <div class="form-group">
                <label>ክርስትና ስም</label>
                <input type="text" name="baptism_name">
            </div>
            <div class="form-group">
                <label>ስልክ ቁጥር</label>
                <input type="tel" name="phone" required>
            </div>
            <div class="form-group">
                <label>ማዕረግ</label>
                <input type="text" name="title">
            </div>
            <div class="form-group">
                <label>አድራሻ</label>
                <input type="text" name="address" required>
            </div>
            <div class="form-group">
                <label>የሥልጠናው ዓይነት</label>
                <select name="course">
                    <option value="በገና">በገና</option>
                    <option value="ግዕዝ">ግዕዝ</option>
                    <option value="ሥነ-ሥዕል">ሥነ-ሥዕል</option>
                    <option value="ቅርጻቅርጽ">ቅርጻቅርጽ</option>
                    <option value="ክራርና መሰንቆ">ክራርና መሰንቆ</option>
                    <option value="መንፈሳዊ ትምህርት">መንፈሳዊ ትምህርት</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">ምዝገባውን አጠናቅቅ</button>
        </form>
    </section>

    <section id="services">
        <h2 style="text-align:center; color: var(--deep-blue); font-size: 1.4rem;">የሥልጠና ዘርፎች</h2>
        <div class="services">
            <div class="card"><div class="card-image" style="background-image: url('መዝሙር.jpg');"></div><h3>በገና</h3><p>የአሥሩ አውታር ምስጢር</p></div>
            <div class="card"><div class="card-image" style="background-image: url('Geez.jpg');"></div><h3>ግዕዝ</h3><p>ጥንታዊው ቋንቋ</p></div>
            <div class="card"><div class="card-image" style="background-image: url('ሥዕል.jpg');"></div><h3>ሥነ-ሥዕል</h3><p>የኢትዮጵያ አዶግራፊ</p></div>
            <div class="card"><div class="card-image" style="background-image: url('ቅርጽ.jpg');"></div><h3>ቅርጻቅርጽ</h3><p>የእንጨትና ድንጋይ ጥበብ</p></div>
        </div>
    </section>
</div>

<footer>
    <p>&copy; 2026 ዋይዜማ የበገናና መንፈሳዊ ጥበባት ማሠልጠኛ ማዕከል</p>
</footer>

</body>
</html>
