<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዋይዜማ የበገናና መንፈሳዊ ጥበባት ማሠልጠኛ ማዕከል</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --deep-blue: #003366; 
            --parchment-bg: #FDF5E6; 
            --dark-text: #2C2C2C;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--parchment-bg);
            color: var(--dark-text);
            line-height: 1.6;
        }

        header {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('HeaderBg.jpg');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 1.5rem 1rem; 
            text-align: center;
            border-bottom: 8px solid var(--primary-gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        header h1 { margin: 0; font-size: 1.8rem; }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('Begena.jpg');
            background-size: cover;
            background-position: center;
            color: white;
            height: 300px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 10px 15px;
        }

        /* ቅጹ የሚያርፍበት የብራና ሳጥን */
        .form-section {
            background-image: url('birana.jpg');
            background-size: cover;
            background-position: center;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            margin: 30px 0;
            border-top: 8px solid var(--primary-gold);
        }

        .form-section h2 {
            text-align: center;
            color: var(--deep-blue);
            margin-top: 0;
        }

        .registration-form {
            display: grid;
            gap: 15px;
            max-width: 600px;
            margin: auto;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--deep-blue);
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            background-color: rgba(255, 255, 255, 0.9);
        }

        .btn-submit {
            background-color: var(--deep-blue);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--primary-gold);
            color: var(--deep-blue);
        }

        .services {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px;
            margin-top: 25px;
        }

        .card {
            background-image: url('birana.jpg');
            background-size: cover;
            border-radius: 10px;
            border-top: 5px solid var(--primary-gold);
            text-align: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .card-image {
            width: 100%;
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
            background-color: rgba(238, 238, 238, 0.5); 
            height: 140px;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            border-top: 5px solid var(--primary-gold);
        }
    </style>
</head>
<body>

<header>
    <h1>ዋይዜማ የበገናና መንፈሳዊ ጥበባት ማሠልጠኛ ማዕከል</h1>
    <p>«ጥንታዊውን ጥበብ ለዘመኑ ትውልድ»</p>
</header>

<nav>
    <a href="#home">መነሻ</a>
    <a href="#services">ዘርፎች</a>
    <a href="#register">መመዝገቢያ</a>
    <a href="#contact">መገናኛ</a>
</nav>

<section class="hero" id="home">
    <h2 style="font-size: 1.8rem; margin-bottom: 10px;">የጥበብ መጀመሪያ እግዚአብሔርን መፍራት ነው</h2>
    <p>በገና ፣ ሥነ ሥዕል ፣ ቅርጻቅርጽ እና ሌሎችም ጥበባት</p>
</section>

<div class="container">
    
    <section id="register" class="form-section">
        <h2>የምዝገባ ቅጽ</h2>
        <form class="registration-form" action="https://formspree.io/f/YOUR_ID_HERE" method="POST">
            <div class="form-group">
                <label>ሙሉ ስም</label>
                <input type="text" name="full_name" required placeholder="የእርስዎን ስም ያስገቡ">
            </div>
            
            <div class="form-group">
                <label>ጾታ</label>
                <select name="gender">
                    <option value="ወንድ">ወንድ</option>
                    <option value="ሴት">ሴት</option>
                </select>
            </div>

            <div class="form-group">
                <label>ክርስትና ስም</label>
                <input type="text" name="baptism_name" placeholder="ካለዎት ያስገቡ">
            </div>

            <div class="form-group">
                <label>ስልክ ቁጥር</label>
                <input type="tel" name="phone" required placeholder="09...">
            </div>

            <div class="form-group">
                <label>ማዕረግ (ካለዎት)</label>
                <input type="text" name="title" placeholder="ለምሳሌ፦ መምህር፣ ዘማሪ...">
            </div>

            <div class="form-group">
                <label>አድራሻ</label>
                <input type="text" name="address" required placeholder="የሚኖሩበት ከተማ/ክፍለ ከተማ">
            </div>

            <div class="form-group">
                <label>የሥልጠናው ዓይነት</label>
                <select name="course_type">
                    <option value="በገና">በገና</option>
                    <option value="ግዕዝ">ግዕዝ</option>
                    <option value="ሥነ-ሥዕል">ሥነ-ሥዕል</option>
                    <option value="ቅርጻቅርጽ">ቅርጻቅርጽ</option>
                    <option value="ክራርና መሰንቆ">ክራርና መሰንቆ</option>
                    <option value="መንፈሳዊ ትምህርት">መንፈሳዊ ትምህርት</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">ምዝገባውን አጠናቅቅ</button>
        </form>
    </section>

    <section id="services">
        <h2 style="text-align:center; color: var(--deep-blue);">የሥልጠና ዘርፎች</h2>
        <div class="services">
            <div class="card"><div class="card-image" style="background-image: url('መዝሙር.jpg');"></div><h3>በገና</h3></div>
            <div class="card"><div class="card-image" style="background-image: url('Geez.jpg');"></div><h3>ግዕዝ</h3></div>
            <div class="card"><div class="card-image" style="background-image: url('ሥዕል.jpg');"></div><h3>ሥነ-ሥዕል</h3></div>
            <div class="card"><div class="card-image" style="background-image: url('ቅርጽ.jpg');"></div><h3>ቅርጻቅርጽ</h3></div>
        </div>
    </section>
</div>

<footer>
    <p>&copy; 2026 ዋይዜማ የበገናና መንፈሳዊ ጥበባት ማሠልጠኛ ማዕከል</p>
</footer>

</body>
</html>
