<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዋይዜማ የበገናና መንፈሳዊ ጥበባት ማሠልጠኛ ማዕከል</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-gold: #D4AF37;
            --deep-blue: #003366; 
            --parchment-bg: #FDF5E6; 
            --dark-text: #2C2C2C;
            --white: #ffffff;
        }

        body {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--parchment-bg);
            color: var(--dark-text);
            scroll-behavior: smooth;
        }

        /* 1. የራስጌ መረጃ (Top Contact Bar) */
        .top-bar {
            background-color: var(--deep-blue);
            color: white;
            padding: 8px 5%;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            flex-wrap: wrap;
        }
        .top-bar a { color: var(--primary-gold); text-decoration: none; margin-left: 15px; }

        header {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('birana.jpg');
            background-size: cover;
            background-position: center;
            color: var(--white);
            padding: 3rem 1rem;
            text-align: center;
            border-bottom: 6px solid var(--primary-gold);
        }

        header h1 { margin: 0; font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.7); }
        header p { font-style: italic; color: var(--primary-gold); font-size: 1.2rem; margin-top: 10px; }

        nav {
            background: #333;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        nav a:hover { color: var(--primary-gold); }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* 3. የጥበብ ጋለሪ (Gallery) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .gallery-item {
            background: #eee;
            border-radius: 8px;
            overflow: hidden;
            height: 200px;
            position: relative;
            border: 2px solid var(--primary-gold);
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .gallery-item:hover img { transform: scale(1.1); }
        .gallery-label {
            position: absolute; bottom: 0; background: rgba(0,51,102,0.8);
            color: white; width: 100%; text-align: center; padding: 5px; font-size: 0.8rem;
        }

        /* 4. የምዝገባ ቅጽ */
        .form-section {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin: 40px 0;
            border-left: 10px solid var(--deep-blue);
        }
        .registration-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: bold; margin-bottom: 5px; color: var(--deep-blue); }
        .form-group input, select { padding: 12px; border: 1px solid #ccc; border-radius: 5px; }
        .full-width { grid-column: span 2; }
        .btn-submit {
            background: var(--deep-blue); color: white; padding: 15px; border: none;
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1rem;
        }
        .btn-submit:hover { background: var(--primary-gold); color: var(--deep-blue); }

        /* 2. ማህበራዊ ሚዲያ (Footer) */
        footer {
            background: #1a1a1a;
            color: white;
            padding: 40px 20px;
            text-align: center;
            margin-top: 50px;
        }
        .social-icons { margin: 20px 0; }
        .social-icons a {
            color: white;
            font-size: 1.8rem;
            margin: 0 15px;
            transition: 0.3s;
        }
        .social-icons a:hover { color: var(--primary-gold); }

        @media (max-width: 768px) {
            .registration-form { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div><i class="fas fa-phone"></i> +251 918 486 017</div>
    <div><i class="fas fa-envelope"></i> amhasilasienigus@gmail.com</div>

<header>
    <h1>ዋይዜማ የበገናና መንፈሳዊ ጥበባት ማሠልጠኛ ማዕከል</h1>
    <p>"ጥንታዊውን ጥበብ ለዘመኑ ትውልድ"</p>
</header>

<nav>
    <a href="#home">መነሻ</a>
    <a href="#gallery">ጋለሪ</a>
    <a href="#register">ምዝገባ</a>
    <a href="#contact">አድራሻ</a>
</nav>

<div class="container">
    
    <section id="gallery">
        <h2 style="text-align:center; color: var(--deep-blue);">የጥበብ ጋለሪ</h2>
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="begena_practice.jpg" alt="በገና ድርደራ">
                <div class="gallery-label">የበገና ድርደራ ልምምድ</div>
            </div>
            <div class="gallery-item">
                <img src="art_exhibition.jpg" alt="ሥነ-ሥዕል">
                <div class="gallery-label">የሥነ-ሥዕል አውደ-ርዕይ</div>
            </div>
            <div class="gallery-item">
                <img src="sculpture.jpg" alt="ቅርጻቅርጽ">
                <div class="gallery-label">የቅርጻቅርጽ ውጤቶች</div>
            </div>
            <div class="gallery-item">
                <img src="graduation.jpg" alt="ምረቃ">
                <div class="gallery-label">የምረቃ ትዕይንቶች</div>
            </div>
        </div>
    </section>

    <section id="register" class="form-section">
        <h2 style="text-align:center;">የምዝገባ ቅጽ</h2>
        <form class="registration-form" action="https://formspree.io/f/mqegpkpe" method="POST">
            <div class="form-group">
                <label>ሙሉ ስም</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>ስልክ ቁጥር</label>
                <input type="tel" name="phone" required>
            </div>
            <div class="form-group">
                <label>ክርስትና ስም</label>
                <input type="text" name="baptism_name">
            </div>
            <div class="form-group">
                <label>የሥልጠና ዓይነት</label>
                <select name="course">
                    <option value="በገና">በገና</option>
                    <option value="ግዕዝ">ግዕዝ</option>
                    <option value="ሥነ-ሥዕል">ሥነ-ሥዕል</option>
                    <option value="ቅርጻቅርጽ">ቅርጻቅርጽ</option>
                </select>
            </div>
            <div class="form-group full-width">
                <label>አድራሻ</label>
                <input type="text" name="address">
            </div>
            <button type="submit" class="btn-submit full-width">ምዝገባውን አጠናቅቅ</button>
        </form>
    </section>

</div>

</footer>

</html>
